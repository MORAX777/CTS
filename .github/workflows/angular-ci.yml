name: Angular CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./DN5-DeepSkilling/Angular/student-course-portal

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: './DN5-DeepSkilling/Angular/student-course-portal/package-lock.json'

    - name: Display Candidate Information
      run: |
        echo "====================================="
        echo "Candidate Name: Aryan Kumar Raj"
        echo "Roll Number: 231fa18066"
        echo "Task: Week 6 - CI/CD Pipeline"
        echo "====================================="

    - name: Install dependencies
      run: npm ci

    - name: Build Angular App
      run: npm run build --if-present

    # Test run can be added here if tests are configured properly
    # - name: Run Tests
    #   run: npm run test -- --watch=false --browsers=ChromeHeadless
